{% extends 'layout/base.html' %} {% load static %}


{% block head%}
    <link rel="stylesheet" href="{% static 'css/products/product_form.css' %}">
{% endblock %}


{% block content %}
    <div class="form-container">
        <div class="form-card">

            <h1> 📦 Marque </h1>

            <form method="POST" enctype="multipart/form-data"> {% csrf_token %}

                <div class="grid">
                    {% for field in form %}
                        <div class="field">
                            <label>{{ field.label }}</label>
                            {{ field }}
                            {{ field.errors }}
                        </div>
                    {% endfor %}
                </div>

                <div class="buttons">
                    <a class="cancel" href="{% url 'products:create' %}">Retour</a>

                    <button>Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

{% endblock %}
