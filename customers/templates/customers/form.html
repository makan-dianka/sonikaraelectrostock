{% extends 'layout/base.html' %} 


{% load static %}

{% block head%}
    <link rel="stylesheet" href="{% static 'css/customers/form.css' %}">
{% endblock %}


{% block content %}

<div class="form-page">

    <div class="form-card">

        <div class="title">

            <h1>

                👤 Client

            </h1>

            <p>

                Ajouter ou modifier un client

            </p>

        </div>


        <form method="POST">

            {% csrf_token %}


            <div class="grid">

                {% for field in form %}

                <div class="field">

                    <label>

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {{ field.errors }}

                </div>

                {% endfor %}

            </div>


            <div class="buttons">

                <a href="{% url 'customers:list' %}" class="cancel">

                    Retour

                </a>


                <button>

                    Enregistrer

                </button>

            </div>


        </form>

    </div>

</div>

{% endblock %}
