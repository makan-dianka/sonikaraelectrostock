{% extends 'layout/base.html' %} {% load static %}

{% block head%}
    <link rel="stylesheet" href="{% static 'css/payments/form.css' %}">
{% endblock %}


{% block content %}
    <div class="payment-container">

        <div class="payment-card">

            <h2 class="payment-title">Enregistrer un paiement</h2>

            <form method="post" class="payment-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="{{ form.amount.id_for_label }}">Montant</label>
                    {{ form.amount }}
                </div>

                <div class="form-group">
                    <label for="{{ form.payment_method.id_for_label }}">Méthode de paiement</label>
                    {{ form.payment_method }}
                </div>

                <div class="form-group">
                    <label for="{{ form.notes.id_for_label }}">Notes</label>
                    {{ form.notes }}
                </div>

                <button type="submit" class="btn-submit">
                    Valider le paiement
                </button>

            </form>

        </div>

    </div>
{% endblock %}
